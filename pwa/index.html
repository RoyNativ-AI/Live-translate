<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Live Translate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    .status-text {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .status-text.active {
      color: #22c55e;
    }

    .power-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid #333;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .power-btn:hover {
      border-color: #555;
    }

    .power-btn:active {
      transform: scale(0.95);
    }

    .power-btn.active {
      border-color: #ef4444;
      box-shadow: 0 0 60px rgba(239, 68, 68, 0.3);
    }

    .power-btn svg {
      width: 60px;
      height: 60px;
      color: #444;
      transition: all 0.3s ease;
    }

    .power-btn.active svg {
      color: #ef4444;
    }

    .power-btn .icon-stop {
      display: none;
    }

    .power-btn.active .icon-power {
      display: none;
    }

    .power-btn.active .icon-stop {
      display: block;
    }

    .lang-display {
      margin-top: 40px;
      text-align: center;
    }

    .lang-display .direction {
      font-size: 24px;
      font-weight: 300;
      color: #fff;
      letter-spacing: 4px;
    }

    .lang-display .arrow {
      color: #444;
      margin: 0 8px;
    }

    .transcript {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 30px 20px;
      background: rgba(0,0,0,0.95);
      display: none;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .transcript.visible {
      display: block;
    }

    .line {
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
      direction: ltr;
      text-align: left;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .line-speaker {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      direction: ltr;
      text-align: left;
    }

    .line-original {
      font-size: 18px;
      color: #fff;
      direction: ltr;
      text-align: left;
      line-height: 1.5;
    }

    .line.interim .line-original {
      color: #888;
    }

    .line-translation {
      font-size: 16px;
      color: #22c55e;
      direction: rtl;
      text-align: right;
      line-height: 1.4;
      margin-top: 8px;
    }

    .settings {
      padding: 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      direction: ltr;
      gap: 10px;
    }

    .setting {
      flex: 1;
    }

    .setting-label {
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .setting select {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      color: #888;
      font-size: 13px;
      appearance: none;
      cursor: pointer;
    }

    .setting select:disabled {
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="status-text" id="statusText">Tap to start</div>

    <button class="power-btn" id="powerBtn" onclick="toggle()">
      <svg class="icon-power" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 2v6"/>
        <circle cx="12" cy="14" r="8"/>
      </svg>
      <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>

    <div class="lang-display">
      <span class="direction">
        EN <span class="arrow">→</span> <span id="targetLangDisplay">HE</span>
      </span>
    </div>

    <div class="transcript" id="transcript"></div>
    <!-- Debug log hidden - uncomment to debug -->
    <!-- <div id="debugLog" style="position:fixed;bottom:80px;left:10px;right:10px;max-height:150px;overflow-y:auto;background:#111;border:1px solid #333;padding:8px;font-size:10px;font-family:monospace;color:#0f0;z-index:9999;display:none;"></div> -->
  </div>

  <div class="settings">
    <div class="setting">
      <div class="setting-label">Translate to</div>
      <select id="targetLang">
        <option value="he">Hebrew</option>
        <option value="en">English</option>
        <option value="ar">Arabic</option>
        <option value="es">Espanol</option>
        <option value="fr">Francais</option>
        <option value="de">Deutsch</option>
        <option value="ru">Russian</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
      </select>
    </div>
  </div>

  <script>
    const SAMPLE_RATE = 16000;
    const SPEAKER_COLORS = ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444'];
    const DIARIZATION_SERVER = 'ws://localhost:8766/ws';

    let isRunning = false;
    let recognition = null;
    let audioContext = null;
    let mediaStream = null;
    let processor = null;
    let diarizationWs = null;
    let currentSpeaker = 1;
    let segmentSpeaker = 1;
    let lastResultIndex = 0;
    let diarizationSegments = [];
    let audioStartTime = 0;

    const powerBtn = document.getElementById('powerBtn');
    const statusText = document.getElementById('statusText');
    const transcript = document.getElementById('transcript');
    const targetLang = document.getElementById('targetLang');
    const targetLangDisplay = document.getElementById('targetLangDisplay');
    // Debug logging disabled
    function log(msg) {
      // console.log(msg);
    }

    targetLang.addEventListener('change', () => {
      targetLangDisplay.textContent = targetLang.value.toUpperCase();
    });

    async function translateText(text, lang) {
      if (!text || lang === 'en') return null;
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        return data?.[0]?.map(item => item[0]).join('') || null;
      } catch {
        return null;
      }
    }

    function toggle() {
      if (isRunning) {
        stop();
      } else {
        start();
      }
    }

    async function start() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        statusText.textContent = 'Browser not supported';
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: true, sampleRate: SAMPLE_RATE }
        });
        audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);

        diarizationWs = new WebSocket(DIARIZATION_SERVER);

        diarizationWs.onopen = () => {
          log('WS: Connected to diarization server');
        };

        diarizationWs.onerror = (err) => {
          log('WS: Error connecting');
        };

        diarizationWs.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            // Store segments for speaker lookup
            if (data.segments) {
              diarizationSegments = data.segments;
            }
            if (data.speaker) {
              // Only update currentSpeaker - don't touch existing segments
              // New segments will pick up the current speaker when created
              currentSpeaker = data.speaker;
            }
          } catch (e) {
            // Ignore parse errors
          }
        };

        processor.onaudioprocess = (e) => {
          if (!isRunning) return;
          if (diarizationWs && diarizationWs.readyState === WebSocket.OPEN) {
            const audioData = e.inputBuffer.getChannelData(0);
            diarizationWs.send(audioData.buffer);
          }
        };

        source.connect(processor);
        processor.connect(audioContext.destination);
      } catch (err) {
        // Continue without diarization
      }

      recognition.onstart = () => {
        isRunning = true;
        currentSpeaker = 1;
        segmentSpeaker = 1;
        lastResultIndex = 0;
        targetLang.disabled = true;
        powerBtn.classList.add('active');
        statusText.classList.add('active');
        statusText.textContent = 'Listening...';
        transcript.classList.add('visible');
        transcript.innerHTML = '';
      };

      recognition.onresult = async (event) => {
        for (let i = lastResultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          const text = result[0].transcript.trim();

          if (!text) continue;

          const isNewSegment = (i > lastResultIndex || lastResultIndex === 0);
          if (isNewSegment) {
            segmentSpeaker = currentSpeaker;
            log(`NEW segment ${i}: speaker=${segmentSpeaker}, text="${text.substring(0,30)}..."`);
          }

          const speakerColor = SPEAKER_COLORS[segmentSpeaker - 1] || '#888';
          const lineId = `line-${i}`;
          let lineDiv = document.getElementById(lineId);

          if (!lineDiv) {
            lineDiv = document.createElement('div');
            lineDiv.id = lineId;
            lineDiv.className = 'line interim';
            lineDiv.innerHTML = `
              <div class="line-speaker" style="color:${speakerColor}">Speaker ${segmentSpeaker}</div>
              <div class="line-original" style="border-left: 3px solid ${speakerColor}; padding-left: 8px;"></div>
              <div class="line-translation"></div>
            `;
            transcript.appendChild(lineDiv);
          }

          lineDiv.querySelector('.line-original').textContent = text;

          if (result.isFinal) {
            lineDiv.classList.remove('interim');
            lastResultIndex = i + 1;

            const lang = targetLang.value;
            if (lang && lang !== 'en') {
              const translated = await translateText(text, lang);
              if (translated) {
                lineDiv.querySelector('.line-translation').textContent = translated;
              }
            }
          }

          transcript.scrollTop = transcript.scrollHeight;
        }
      };

      recognition.onerror = (event) => {
        // Restart on recoverable errors
        if (isRunning && event.error !== 'aborted') {
          setTimeout(() => {
            if (isRunning) recognition.start();
          }, 100);
        }
      };

      recognition.onend = () => {
        if (isRunning) {
          setTimeout(() => {
            if (isRunning) recognition.start();
          }, 100);
        }
      };

      recognition.start();
    }

    function stop() {
      isRunning = false;

      if (recognition) {
        recognition.stop();
        recognition = null;
      }

      if (diarizationWs) {
        diarizationWs.close();
        diarizationWs = null;
      }

      if (processor) {
        processor.disconnect();
        processor = null;
      }

      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }

      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }

      currentSpeaker = 1;
      segmentSpeaker = 1;
      lastResultIndex = 0;
      targetLang.disabled = false;

      powerBtn.classList.remove('active');
      statusText.classList.remove('active');
      statusText.textContent = 'Tap to start';
      transcript.classList.remove('visible');
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
