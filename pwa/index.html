<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Live Translate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Main area with big button */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    /* Status text above button */
    .status-text {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .status-text.active {
      color: #22c55e;
    }


    /* Big circular button */
    .power-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid #333;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .power-btn::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .power-btn:hover {
      border-color: #555;
    }

    .power-btn:active {
      transform: scale(0.95);
    }

    .power-btn.active {
      border-color: #ef4444;
      box-shadow: 0 0 60px rgba(239, 68, 68, 0.3);
    }

    .power-btn.active::before {
      border-color: rgba(34, 197, 94, 0.2);
    }

    .power-btn.loading {
      border-color: #eab308;
    }

    .power-btn svg {
      width: 60px;
      height: 60px;
      color: #444;
      transition: all 0.3s ease;
    }


    .power-btn.active svg {
      color: #ef4444;
    }

    .power-btn.loading svg {
      color: #eab308;
      animation: pulse 1s infinite;
    }

    .power-btn .icon-stop {
      display: none;
    }

    .power-btn.active .icon-power {
      display: none;
    }

    .power-btn.active .icon-stop {
      display: block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Language display */
    .lang-display {
      margin-top: 40px;
      text-align: center;
    }

    .lang-display .direction {
      font-size: 24px;
      font-weight: 300;
      color: #fff;
      letter-spacing: 4px;
    }

    .lang-display .arrow {
      color: #444;
      margin: 0 8px;
    }

    /* Transcript area */
    .transcript {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 30px 20px;
      background: rgba(0,0,0,0.95);
      display: none;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .transcript.visible {
      display: block;
    }

    .line {
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .line-original {
      font-size: 13px;
      color: #555;
      direction: ltr;
      text-align: left;
      margin-bottom: 4px;
    }

    .line-translation {
      font-size: 20px;
      font-weight: 500;
      color: #fff;
      direction: rtl;
      text-align: right;
      line-height: 1.4;
    }

    /* Bottom settings */
    .settings {
      padding: 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      direction: ltr;
      gap: 10px;
    }

    .setting {
      flex: 1;
      position: relative;
    }

    .setting-label {
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .setting select {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      color: #888;
      font-size: 13px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .setting select:focus {
      outline: none;
      border-color: #333;
    }

    .setting select:disabled {
      opacity: 0.4;
    }

    /* Progress bar */
    .progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #111;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .progress.visible {
      opacity: 1;
    }

    .progress-fill {
      height: 100%;
      background: #22c55e;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="status-text" id="statusText">Tap to start</div>

    <button class="power-btn" id="powerBtn" onclick="toggleTranscription()">
      <svg class="icon-power" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 2v6"/>
        <circle cx="12" cy="14" r="8"/>
      </svg>
      <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>

    <div class="lang-display">
      <span class="direction">
        EN <span class="arrow">→</span> <span id="targetLangDisplay">HE</span>
      </span>
    </div>

    <div class="transcript" id="transcript"></div>
  </div>

  <div class="settings">
    <div class="setting">
      <div class="setting-label">Translate to</div>
      <select id="targetLang">
        <option value="he">Hebrew</option>
        <option value="en">English</option>
        <option value="ar">العربية</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ru">Русский</option>
        <option value="zh">中文</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <div class="setting">
      <div class="setting-label">Model</div>
      <select id="modelSelect">
        <option value="onnx-community/moonshine-base-ONNX">Moonshine</option>
        <option value="onnx-community/whisper-tiny.en">Whisper Tiny</option>
        <option value="onnx-community/whisper-base.en">Whisper Base</option>
        <option value="onnx-community/whisper-small.en">Whisper Small</option>
      </select>
    </div>
  </div>

  <div class="progress" id="progress">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.4.0';

    env.allowLocalModels = false;
    env.useBrowserCache = true;

    let isRunning = false;
    let transcriber = null;
    let audioContext = null;
    let mediaStream = null;
    let processor = null;

    const SAMPLE_RATE = 16000;
    const VAD_FRAME_SAMPLES = 480;
    const SPEECH_THRESHOLD = 0.001;  // Very sensitive
    const SILENCE_MS = 200;          // Very fast cutoff
    const MIN_SPEECH_MS = 150;       // Minimum speech
    const MAX_CHUNK_MS = 3000;       // 3 sec max chunks
    const MIN_CHUNK_MS = 200;        // Ultra fast response

    let speechBuffer = [];
    let silenceFrames = 0;
    let speechFrames = 0;
    let isSpeaking = false;
    let chunkStart = 0;
    let workerBusy = false;
    let pendingAudio = null;
    let modelReady = false;

    const powerBtn = document.getElementById('powerBtn');
    const statusText = document.getElementById('statusText');
    const progress = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const transcript = document.getElementById('transcript');
    const modelSelect = document.getElementById('modelSelect');
    const targetLang = document.getElementById('targetLang');
    const targetLangDisplay = document.getElementById('targetLangDisplay');

    // Check if model is cached
    async function checkModelCached(modelId) {
      try {
        const caches = await window.caches.keys();
        for (const cacheName of caches) {
          const cache = await window.caches.open(cacheName);
          const keys = await cache.keys();
          if (keys.some(k => k.url.includes(modelId.replace('/', '_')) || k.url.includes(modelId))) {
            return true;
          }
        }
        // Also check IndexedDB (transformers.js cache)
        return await new Promise(resolve => {
          const req = indexedDB.open('transformers-cache');
          req.onsuccess = () => {
            const db = req.result;
            if (db.objectStoreNames.contains('models')) {
              const tx = db.transaction('models', 'readonly');
              const store = tx.objectStore('models');
              const getReq = store.get(modelId);
              getReq.onsuccess = () => resolve(!!getReq.result);
              getReq.onerror = () => resolve(false);
            } else {
              resolve(false);
            }
            db.close();
          };
          req.onerror = () => resolve(false);
        });
      } catch {
        return false;
      }
    }

    async function updateButtonState() {
      const modelId = modelSelect.value;
      const cached = await checkModelCached(modelId);
      if (cached || transcriber) {
        modelReady = true;
        statusText.textContent = 'Tap to listen';
      } else {
        modelReady = false;
        statusText.textContent = 'Tap to download';
      }
    }

    // Update display when language changes
    targetLang.addEventListener('change', () => {
      targetLangDisplay.textContent = targetLang.value.toUpperCase();
    });

    // Update button when model changes
    modelSelect.addEventListener('change', () => {
      transcriber = null;
      modelReady = false;
      updateButtonState();
    });

    // Initial check
    updateButtonState();

    async function translateText(text, targetLangCode) {
      if (!text || targetLangCode === 'en') return null;
      try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLangCode}&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        if (data && data[0]) {
          return data[0].map(item => item[0]).join('');
        }
        return null;
      } catch (err) {
        console.error('Translation error:', err);
        return null;
      }
    }

    window.toggleTranscription = async function() {
      if (isRunning) {
        stop();
      } else if (modelReady) {
        await startListening();
      } else {
        await downloadModel();
      }
    };

    async function downloadModel() {
      powerBtn.classList.add('loading');
      setStatus('Downloading...');

      try {
        const modelId = modelSelect.value;
        let device = 'wasm';
        try {
          if (navigator.gpu) {
            const adapter = await navigator.gpu.requestAdapter();
            if (adapter) device = 'webgpu';
          }
        } catch {}

        const downloadProgress = {};
        transcriber = await pipeline('automatic-speech-recognition', modelId, {
          device,
          dtype: device === 'webgpu' ? 'fp32' : 'q8',
          progress_callback: (p) => {
            if (p.status === 'progress' && p.file) {
              downloadProgress[p.file] = p.progress || 0;
              const files = Object.values(downloadProgress);
              const total = files.reduce((a, b) => a + b, 0) / Math.max(files.length, 1);
              progress.classList.add('visible');
              progressFill.style.width = `${total}%`;
              setStatus(`Downloading ${Math.round(total)}%`);
            }
          },
        });

        progress.classList.remove('visible');
        modelReady = true;
        powerBtn.classList.remove('loading');
        setStatus('Tap to listen');

      } catch (err) {
        powerBtn.classList.remove('loading');
        setStatus(err.message);
      }
    }

    async function startListening() {
      powerBtn.classList.add('loading');
      setStatus('Starting...');

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: true, autoGainControl: true, sampleRate: SAMPLE_RATE },
        });

        audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);

        processor.onaudioprocess = (e) => {
          if (!isRunning) return;
          const data = new Float32Array(e.inputBuffer.getChannelData(0));
          for (let i = 0; i < data.length; i += VAD_FRAME_SAMPLES) {
            const frame = data.slice(i, Math.min(i + VAD_FRAME_SAMPLES, data.length));
            if (frame.length >= VAD_FRAME_SAMPLES * 0.5) processFrame(frame);
          }
        };

        source.connect(processor);
        processor.connect(audioContext.destination);

        isRunning = true;
        resetVAD();
        modelSelect.disabled = true;
        targetLang.disabled = true;

        powerBtn.classList.remove('loading');
        powerBtn.classList.add('active');
        statusText.classList.remove('ready');
        statusText.classList.add('active');
        setStatus('Tap to stop');
        transcript.classList.add('visible');

      } catch (err) {
        powerBtn.classList.remove('loading', 'active');
        setStatus(err.message);
      }
    }

    function stop() {
      isRunning = false;
      flushBuffer();

      if (processor) { processor.disconnect(); processor = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

      resetVAD();
      modelSelect.disabled = false;
      targetLang.disabled = false;

      powerBtn.classList.remove('active', 'loading');
      statusText.classList.remove('active');
      setStatus('Tap to listen');
      transcript.classList.remove('visible');
      transcript.innerHTML = '';
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function frameEnergy(frame) {
      let sum = 0;
      for (let i = 0; i < frame.length; i++) sum += frame[i] * frame[i];
      return Math.sqrt(sum / frame.length);
    }

    function processFrame(frame) {
      const energy = frameEnergy(frame);
      const isSpeechFrame = energy > SPEECH_THRESHOLD;

      if (isSpeechFrame) {
        silenceFrames = 0;
        speechFrames++;
        if (!isSpeaking && speechFrames >= 2) {
          isSpeaking = true;
          chunkStart = Date.now();
        }
      } else {
        speechFrames = 0;
        if (isSpeaking) silenceFrames++;
      }

      if (isSpeaking || speechFrames > 0) {
        speechBuffer.push(new Float32Array(frame));
      }

      const elapsed = Date.now() - chunkStart;
      const silenceMs = silenceFrames * 30;

      if (isSpeaking && ((silenceMs >= SILENCE_MS && elapsed >= MIN_CHUNK_MS) || elapsed >= MAX_CHUNK_MS)) {
        flushBuffer();
      }
    }

    function resetVAD() {
      speechBuffer = [];
      silenceFrames = 0;
      speechFrames = 0;
      isSpeaking = false;
      chunkStart = 0;
    }

    function flushBuffer() {
      if (speechBuffer.length === 0) return;
      const total = speechBuffer.reduce((s, b) => s + b.length, 0);
      if ((total / SAMPLE_RATE) * 1000 < MIN_SPEECH_MS) { resetVAD(); return; }

      const combined = new Float32Array(total);
      let off = 0;
      for (const b of speechBuffer) { combined.set(b, off); off += b.length; }

      if (workerBusy) { pendingAudio = combined; }
      else { runInference(combined); }
      resetVAD();
    }

    async function runInference(audio) {
      if (!transcriber) return;
      workerBusy = true;

      try {
        const result = await transcriber(audio, { return_timestamps: false });
        if (result && result.text && result.text.trim()) {
          const text = result.text.trim();
          addLine(text);

          const lang = targetLang.value;
          if (lang && lang !== 'en') {
            const translated = await translateText(text, lang);
            if (translated) updateLastTranslation(translated);
          }
        }
      } catch (err) {
        console.error('Inference error:', err);
      } finally {
        workerBusy = false;
      }

      if (pendingAudio) {
        const next = pendingAudio;
        pendingAudio = null;
        runInference(next);
      }
    }

    function addLine(original) {
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = `
        <div class="line-original">${escapeHtml(original)}</div>
        <div class="line-translation" style="color:#333">...</div>
      `;
      transcript.appendChild(div);
      transcript.scrollTop = transcript.scrollHeight;
    }

    function updateLastTranslation(translation) {
      const lines = transcript.querySelectorAll('.line');
      if (lines.length === 0) return;
      const last = lines[lines.length - 1];
      const transDiv = last.querySelector('.line-translation');
      if (transDiv) {
        transDiv.textContent = translation;
        transDiv.style.color = '#fff';
      }
      transcript.scrollTop = transcript.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
